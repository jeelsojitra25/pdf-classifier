name: Build PDF Classifier

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet packages
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish self-contained .exe
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

    - name: Upload .exe as artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDFClassifier-win-x64
        path: ./publish/PDFClassifier.exe
        retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: PDFClassifier-win-x64
        path: ./release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: PDF Classifier v1.0.${{ github.run_number }}
        body: |
          Self-contained Windows .exe — no install needed.
          
          Usage:
          PDFClassifier.exe "C:\Records\PDFs" "C:\Records\Sorted"
          PDFClassifier.exe "C:\Records\PDFs" "C:\Records\Sorted" --preview
        files: ./release/PDFClassifier.exe
        draft: false
        prerelease: false
